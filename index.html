<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión Bancaria</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>

  <!-- Barra de navegación -->
  <header id="navbar"></header>

  <!-- Aquí el Router inyecta la página activa -->
  <main id="app"></main>

  <!-- Modal reutilizable -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title"></h2>
        <button class="modal__close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal__body"></div>
      <div class="modal__footer">
        <button class="btn btn--secondary modal__cancel">Cancelar</button>
        <button class="btn btn--primary modal__confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Punto de entrada -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
